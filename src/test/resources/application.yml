rabbitmq:
  queue: audit.queue
  exchange: audit.exchange
  routingKey: audit.routingKey

spring:
  liquibase:
    enabled: false
  rabbitmq:
    listener:
      simple:
        auto-startup: false
      direct:
        auto-startup: false
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
